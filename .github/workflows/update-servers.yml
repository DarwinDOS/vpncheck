name: Update VPNGate Server List

on:
  schedule:
    - cron: '0 */6 * * *'   # каждые 6 часов
  workflow_dispatch:          # + кнопка "Run workflow" вручную в GitHub

permissions:
  contents: write             # нужно чтобы коммитить servers.json

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch and convert VPNGate list to JSON
        run: python fetch_servers.py

      - name: Commit servers.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add servers.json
          # Коммитим только если файл реально изменился
          git diff --cached --quiet || git commit -m "chore: update servers.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
